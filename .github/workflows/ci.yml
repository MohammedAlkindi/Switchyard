name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Newer pushes supersede in-flight runs of the same branch/PR; keep every
# run on main so its history stays complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    strategy:
      # A git-behavior bug on one OS shouldn't hide results from the others.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22, 24]
    name: ${{ matrix.os }} / node ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Catches packaging breakage the unit tests can't see: a bad shebang,
      # an unresolvable import in the compiled output, or a files-array typo.
      - name: Smoke-test the built CLI
        run: node dist/cli.js --version

      - name: Preview npm pack contents
        run: npm pack --dry-run

      - name: Test
        run: npm test
